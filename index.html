<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS 成長表</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #ff5c35; --orange-light: #ff9a44; --red: #ff2e2e;
  --dark: #1a1a1a; --mid: #242424; --surface: #2a2a2a; --surface2: #333;
  --border: rgba(255,255,255,0.08); --text: #f0ede8; --muted: rgba(240,237,232,0.45);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }

.header {
  background: linear-gradient(135deg,var(--red) 0%,var(--orange) 55%,var(--orange-light) 100%);
  padding:1.75rem 2rem; display:flex; align-items:center; gap:1.1rem;
  position:relative; overflow:hidden;
}
.header::before { content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(255,255,255,.18) 0%,transparent 60%);pointer-events:none; }
.logo-circle { width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,.22);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.logo-circle span { font-family:'Playfair Display',serif;font-weight:900;font-size:14px;color:#fff;letter-spacing:.04em; }
.header-text h1 { font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#fff;line-height:1.1; }
.header-text p { font-size:.7rem;color:rgba(255,255,255,.7);margin-top:3px;letter-spacing:.12em;text-transform:uppercase; }
.header-deco { position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:5rem;color:rgba(255,255,255,.12);font-family:'Playfair Display',serif;pointer-events:none; }

.tabs { display:flex;background:var(--mid);border-bottom:1px solid var(--border); }
.tab-btn { flex:1;padding:.9rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.05em; }
.tab-btn.active { color:var(--orange);border-bottom-color:var(--orange);background:rgba(255,92,53,.06); }
.tab-btn:hover:not(.active) { color:var(--text);background:rgba(255,255,255,.03); }

.content { display:none;padding:1.5rem 1.75rem; }
.content.active { display:block; }

.controls-row { display:flex;align-items:flex-end;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap; }
.ctrl-group { display:flex;flex-direction:column;gap:5px; }
.ctrl-group label { font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em; }
.ctrl-group select { background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.85rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;outline:none;min-width:90px; }
.ctrl-group select:focus { border-color:var(--orange); }

.month-tabs { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem; }
.month-tab { padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.75rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s; }
.month-tab.active { background:var(--orange);border-color:var(--orange);color:#fff; }
.month-tab:hover:not(.active) { border-color:rgba(255,255,255,.2);color:var(--text); }

.input-section { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem; }
.input-section-title { font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:1rem; }
.input-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px; }
.input-cell { display:flex;flex-direction:column;gap:5px; }
.input-cell label { font-size:.75rem;font-weight:500;letter-spacing:.04em; }
.input-cell input { width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:.9rem;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s; }
.input-cell input:focus { border-color:var(--orange); }

.total-bar { display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(255,92,53,.15),rgba(255,92,53,.04));border:1px solid rgba(255,92,53,.3);border-radius:10px;padding:.85rem 1.25rem;margin-bottom:1.25rem; }
.total-label { font-size:.8rem;color:var(--muted); }
.total-value { font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--orange); }

.btn-row { display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.5rem;align-items:center; }
.btn { display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border:none;border-radius:25px;font-size:.83rem;font-family:'Noto Sans TC',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.03em; }
.btn-primary { background:var(--orange);color:#fff; }
.btn-primary:hover { background:#e04b28; }
.btn-secondary { background:var(--surface);color:var(--text);border:1px solid var(--border); }
.btn-secondary:hover { border-color:rgba(255,255,255,.25);background:var(--surface2); }
.btn-outline { background:transparent;color:var(--orange);border:1px solid var(--orange); }
.btn-outline:hover { background:rgba(255,92,53,.1); }
.btn:active { transform:scale(.97); }

.legend { display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1.25rem; }
.legend-item { display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted); }
.legend-dot { width:10px;height:10px;border-radius:2px;flex-shrink:0; }

.chart-wrap { position:relative;width:100%;height:380px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1rem .5rem; }

/* ── Download modal ── */
.modal-bg { display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#222;border:1px solid var(--border);border-radius:16px;padding:1.75rem;width:min(420px,90vw);position:relative; }
.modal h2 { font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:.4rem; }
.modal p { font-size:.8rem;color:var(--muted);margin-bottom:1.25rem; }
.modal-close { position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1; }
.modal-close:hover { color:var(--text); }
.modal-section { margin-bottom:1.25rem; }
.modal-section-title { font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.6rem; }
.dl-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.dl-btn { display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--text);font-size:.78rem;transition:all .15s; }
.dl-btn:hover { border-color:var(--orange);background:rgba(255,92,53,.08); }
.dl-icon { font-size:1.4rem; }

.footer { text-align:center;padding:1.1rem;font-size:.68rem;color:var(--muted);border-top:1px solid var(--border);letter-spacing:.08em; }

@media(max-width:500px){ .header{padding:1.25rem 1rem;} .content{padding:1rem;} .header-deco{display:none;} }
</style>
</head>
<body>

<div class="header">
  <div class="logo-circle"><span>ADS</span></div>
  <div class="header-text">
    <h1>ADS 成長表</h1>
    <p>數據追蹤儀表板 · Growth Tracker</p>
  </div>
  <div class="header-deco">✦</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('fans',this)">📈 粉絲成長</button>
  <button class="tab-btn" onclick="switchTab('clients',this)">👥 客人狀態</button>
</div>

<!-- 粉絲成長 -->
<div id="fans" class="content active">
  <div class="controls-row">
    <div class="ctrl-group">
      <label>年份</label>
      <select id="f-year" onchange="initFansTabs()">
        <option>2023</option><option>2024</option><option selected>2025</option><option>2026</option>
      </select>
    </div>
  </div>
  <div class="month-tabs" id="f-month-tabs"></div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#1877F2"></span>臉書</span>
    <span class="legend-item"><span class="legend-dot" style="background:#E1306C"></span>IG</span>
    <span class="legend-item"><span class="legend-dot" style="background:#999"></span>Threads</span>
    <span class="legend-item"><span class="legend-dot" style="background:#69C9D0"></span>TikTok</span>
    <span class="legend-item"><span class="legend-dot" style="background:#FE2C55"></span>小紅書</span>
  </div>
  <div class="input-section">
    <div class="input-section-title" id="f-input-title">輸入粉絲數</div>
    <div class="input-grid" id="fans-inputs"></div>
  </div>
  <div class="total-bar">
    <span class="total-label">本月平台總粉絲數</span>
    <span class="total-value" id="fans-total">0</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="updateFansChart()">更新圖表 →</button>
    <button class="btn btn-outline" onclick="openModal('fans')">⬇ 下載報表</button>
  </div>
  <div class="chart-wrap">
    <canvas id="fansChart" role="img" aria-label="粉絲成長堆疊長條圖">各平台粉絲堆疊成長圖</canvas>
  </div>
</div>

<!-- 客人狀態 -->
<div id="clients" class="content">
  <div class="controls-row">
    <div class="ctrl-group">
      <label>年份</label>
      <select id="c-year" onchange="initClientsTabs()">
        <option>2023</option><option>2024</option><option selected>2025</option><option>2026</option>
      </select>
    </div>
  </div>
  <div class="month-tabs" id="c-month-tabs"></div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#ff5c35"></span>新客</span>
    <span class="legend-item"><span class="legend-dot" style="background:#378ADD"></span>回購</span>
    <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>實習</span>
    <span class="legend-item"><span class="legend-dot" style="background:#D4537E"></span>三級</span>
  </div>
  <div class="input-section">
    <div class="input-section-title" id="c-input-title">輸入客人數量</div>
    <div class="input-grid" id="clients-inputs"></div>
  </div>
  <div class="total-bar">
    <span class="total-label">本月客人總數</span>
    <span class="total-value" id="clients-total">0</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="updateClientsChart()">更新圖表 →</button>
    <button class="btn btn-outline" onclick="openModal('clients')">⬇ 下載報表</button>
  </div>
  <div class="chart-wrap">
    <canvas id="clientsChart" role="img" aria-label="客人狀態堆疊長條圖">各類型客人堆疊圖</canvas>
  </div>
</div>

<div class="footer">ADS 成長表 · 版本 3.0 · 數據僅存於本地端</div>

<!-- Download Modal -->
<div class="modal-bg" id="dl-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>下載報表</h2>
    <p id="dl-modal-desc">選擇報表類型與格式</p>
    <div class="modal-section">
      <div class="modal-section-title">月報表</div>
      <div class="dl-grid">
        <button class="dl-btn" onclick="dlMonthPNG()"><span class="dl-icon">🖼</span><span>月報圖片<br><small style="color:var(--muted)">.PNG</small></span></button>
        <button class="dl-btn" onclick="dlMonthCSV()"><span class="dl-icon">📊</span><span>月報數據<br><small style="color:var(--muted)">.CSV</small></span></button>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">年度報表</div>
      <div class="dl-grid">
        <button class="dl-btn" onclick="dlYearPNG()"><span class="dl-icon">📈</span><span>年度圖表<br><small style="color:var(--muted)">.PNG</small></span></button>
        <button class="dl-btn" onclick="dlYearCSV()"><span class="dl-icon">📋</span><span>年度數據<br><small style="color:var(--muted)">.CSV</small></span></button>
      </div>
    </div>
  </div>
</div>

<script>
Chart.register(ChartDataLabels);

var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var PLATFORMS = ['臉書','IG','Threads','TikTok','小紅書'];
var P_COLORS  = ['#1877F2','#E1306C','#888888','#69C9D0','#FE2C55'];
var CLIENT_TYPES = ['新客','回購','實習','三級'];
var C_COLORS = ['#ff5c35','#378ADD','#1D9E75','#D4537E'];

var fansData = {};
var clientsData = {};
var fansChart = null;
var clientsChart = null;
var fMonth = 1;
var cMonth = 1;
var activeTab = 'fans';
var modalTab = 'fans';

function key(year, month) { return year + '-' + month; }
function fmtNum(v) { return v >= 1000 ? (v/1000).toFixed(1)+'K' : String(v); }

/* ── total-on-top plugin ── */
function makeTotalPlugin() {
  return {
    id: 'totalLabels',
    afterDatasetsDraw: function(chart) {
      var ctx = chart.ctx;
      var meta0 = chart.getDatasetMeta(0);
      ctx.save();
      chart.data.labels.forEach(function(label, i) {
        var total = chart.data.datasets.reduce(function(s, ds) { return s + (ds.data[i] || 0); }, 0);
        if (total === 0) return;
        var bar = meta0.data[i];
        var topY = chart.scales.y.getPixelForValue(total);
        ctx.fillStyle = '#f0ede8';
        ctx.font = '500 11px Noto Sans TC, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(fmtNum(total), bar.x, topY - 7);
      });
      ctx.restore();
    }
  };
}

/* ══ FANS ══ */
function initFansTabs() {
  fMonth = 1;
  var container = document.getElementById('f-month-tabs');
  container.innerHTML = '';
  MONTHS.forEach(function(m, i) {
    var btn = document.createElement('button');
    btn.className = 'month-tab' + (i === 0 ? ' active' : '');
    btn.textContent = m;
    (function(month, el) {
      el.onclick = function() {
        fMonth = month;
        document.querySelectorAll('#f-month-tabs .month-tab').forEach(function(b){ b.classList.remove('active'); });
        el.classList.add('active');
        renderFansInputs();
      };
    })(i+1, btn);
    container.appendChild(btn);
  });
  renderFansInputs();
  updateFansChart();
}

function renderFansInputs() {
  var year = document.getElementById('f-year').value;
  var k = key(year, fMonth);
  if (!fansData[k]) fansData[k] = PLATFORMS.map(function(){ return 0; });
  document.getElementById('f-input-title').textContent = '輸入 '+year+' 年 '+fMonth+' 月各平台粉絲數';
  var container = document.getElementById('fans-inputs');
  container.innerHTML = '';
  PLATFORMS.forEach(function(p, i) {
    var cell = document.createElement('div');
    cell.className = 'input-cell';
    cell.innerHTML = '<label style="color:'+P_COLORS[i]+'">'+p+'</label><input type="number" min="0" value="'+fansData[k][i]+'" id="fp-'+i+'" oninput="saveFan('+i+')">';
    container.appendChild(cell);
  });
  updateFansTotal();
}

function saveFan(i) {
  var year = document.getElementById('f-year').value;
  var k = key(year, fMonth);
  if (!fansData[k]) fansData[k] = PLATFORMS.map(function(){ return 0; });
  fansData[k][i] = parseInt(document.getElementById('fp-'+i).value)||0;
  updateFansTotal();
}

function updateFansTotal() {
  var year = document.getElementById('f-year').value;
  var vals = fansData[key(year,fMonth)]||[];
  document.getElementById('fans-total').textContent = vals.reduce(function(a,b){return a+b;},0).toLocaleString();
}

function buildFansDatasets(year) {
  return PLATFORMS.map(function(p, pi) {
    return {
      label: p,
      data: MONTHS.map(function(_,mi){ return (fansData[key(year,mi+1)]||[])[pi]||0; }),
      backgroundColor: P_COLORS[pi],
      stack: 'stack',
      datalabels: {
        display: function(ctx){ return ctx.dataset.data[ctx.dataIndex]>0; },
        color: '#fff', font:{size:10,weight:'500',family:'Noto Sans TC,sans-serif'},
        formatter: function(v){ return fmtNum(v); }, anchor:'center', align:'center', clamp:true
      }
    };
  });
}

function updateFansChart() {
  var year = document.getElementById('f-year').value;
  var k = key(year,fMonth);
  if (!fansData[k]) fansData[k] = PLATFORMS.map(function(){ return 0; });
  PLATFORMS.forEach(function(_,i){
    var el = document.getElementById('fp-'+i);
    if(el) fansData[k][i] = parseInt(el.value)||0;
  });
  updateFansTotal();
  if (fansChart) fansChart.destroy();
  fansChart = new Chart(document.getElementById('fansChart'), {
    type:'bar', data:{labels:MONTHS, datasets:buildFansDatasets(year)},
    plugins:[makeTotalPlugin()],
    options: chartOptions(year, 'fans')
  });
}

/* ══ CLIENTS ══ */
function initClientsTabs() {
  cMonth = 1;
  var container = document.getElementById('c-month-tabs');
  container.innerHTML = '';
  MONTHS.forEach(function(m, i) {
    var btn = document.createElement('button');
    btn.className = 'month-tab'+(i===0?' active':'');
    btn.textContent = m;
    (function(month, el){
      el.onclick = function(){
        cMonth = month;
        document.querySelectorAll('#c-month-tabs .month-tab').forEach(function(b){ b.classList.remove('active'); });
        el.classList.add('active');
        renderClientsInputs();
      };
    })(i+1, btn);
    container.appendChild(btn);
  });
  renderClientsInputs();
  updateClientsChart();
}

function renderClientsInputs() {
  var year = document.getElementById('c-year').value;
  var k = key(year,cMonth);
  if (!clientsData[k]) clientsData[k] = CLIENT_TYPES.map(function(){ return 0; });
  document.getElementById('c-input-title').textContent = '輸入 '+year+' 年 '+cMonth+' 月各類型客人數量';
  var container = document.getElementById('clients-inputs');
  container.innerHTML = '';
  CLIENT_TYPES.forEach(function(t, i){
    var cell = document.createElement('div');
    cell.className = 'input-cell';
    cell.innerHTML = '<label style="color:'+C_COLORS[i]+'">'+t+'</label><input type="number" min="0" value="'+clientsData[k][i]+'" id="cp-'+i+'" oninput="saveClient('+i+')">';
    container.appendChild(cell);
  });
  updateClientsTotal();
}

function saveClient(i) {
  var year = document.getElementById('c-year').value;
  var k = key(year,cMonth);
  if (!clientsData[k]) clientsData[k] = CLIENT_TYPES.map(function(){ return 0; });
  clientsData[k][i] = parseInt(document.getElementById('cp-'+i).value)||0;
  updateClientsTotal();
}

function updateClientsTotal() {
  var year = document.getElementById('c-year').value;
  var vals = clientsData[key(year,cMonth)]||[];
  document.getElementById('clients-total').textContent = vals.reduce(function(a,b){return a+b;},0).toLocaleString();
}

function buildClientsDatasets(year) {
  return CLIENT_TYPES.map(function(t, ti){
    return {
      label: t,
      data: MONTHS.map(function(_,mi){ return (clientsData[key(year,mi+1)]||[])[ti]||0; }),
      backgroundColor: C_COLORS[ti],
      stack: 'stack',
      datalabels: {
        display: function(ctx){ return ctx.dataset.data[ctx.dataIndex]>0; },
        color:'#fff', font:{size:10,weight:'500',family:'Noto Sans TC,sans-serif'},
        formatter: function(v){ return v; }, anchor:'center', align:'center', clamp:true
      }
    };
  });
}

function updateClientsChart() {
  var year = document.getElementById('c-year').value;
  var k = key(year,cMonth);
  if (!clientsData[k]) clientsData[k] = CLIENT_TYPES.map(function(){ return 0; });
  CLIENT_TYPES.forEach(function(_,i){
    var el = document.getElementById('cp-'+i);
    if(el) clientsData[k][i] = parseInt(el.value)||0;
  });
  updateClientsTotal();
  if (clientsChart) clientsChart.destroy();
  clientsChart = new Chart(document.getElementById('clientsChart'), {
    type:'bar', data:{labels:MONTHS, datasets:buildClientsDatasets(year)},
    plugins:[makeTotalPlugin()],
    options: chartOptions(year, 'clients')
  });
}

function chartOptions(year, tab) {
  return {
    responsive:true, maintainAspectRatio:false,
    layout:{padding:{top:22}},
    plugins:{
      legend:{display:false}, datalabels:{},
      tooltip:{
        backgroundColor:'#1e1e1e', borderColor:'rgba(255,255,255,.1)', borderWidth:1,
        titleColor:'#f0ede8', bodyColor:'rgba(240,237,232,.75)',
        callbacks:{
          footer: function(items){
            var mi = items[0].dataIndex;
            var mk = key(year, mi+1);
            var vals = (tab==='fans'?fansData:clientsData)[mk]||[];
            return '總計: '+vals.reduce(function(a,b){return a+b;},0).toLocaleString();
          }
        }
      }
    },
    scales:{
      x:{ stacked:true, ticks:{color:'rgba(240,237,232,.5)',font:{size:11},autoSkip:false,maxRotation:0}, grid:{color:'rgba(255,255,255,.04)'} },
      y:{ stacked:true, ticks:{color:'rgba(240,237,232,.5)',font:{size:11},callback:function(v){return v>=1000?(v/1000).toFixed(0)+'K':v;}}, grid:{color:'rgba(255,255,255,.06)'} }
    }
  };
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.content').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById(tab).classList.add('active');
  activeTab = tab;
}

/* ══ MODAL ══ */
function openModal(tab) {

  var year = document.getElementById(tab==='fans'?'f-year':'c-year').value;

document.getElementById('dl-modal').addEventListener('click', function(e){

/* ══ DOWNLOAD HELPERS ══ */
function downloadLink(url, filename) {
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
}

/* PNG: draw a clean off-screen canvas with white bg, header, legend, chart */
function renderReportCanvas(tab, year, monthIndex, isYearly, callback) {
  var isFans = tab === 'fans';
  var categories = isFans ? PLATFORMS : CLIENT_TYPES;
  var colors = isFans ? P_COLORS : C_COLORS;
  var allData = isFans ? fansData : clientsData;

  var W = 1200, H = isYearly ? 820 : 680;
  var offCanvas = document.createElement('canvas');
  offCanvas.width = W; offCanvas.height = H;
  var ctx = offCanvas.getContext('2d');

  /* background */
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0,0,W,H);

  /* header gradient */
  var grad = ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#ff2e2e'); grad.addColorStop(.55,'#ff5c35'); grad.addColorStop(1,'#ff9a44');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,90);

  /* logo circle */
  ctx.save();
  ctx.beginPath(); ctx.arc(60,45,28,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#fff'; ctx.font='bold 14px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('ADS',60,45);

  /* title */
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff'; ctx.font='bold 28px serif';
  ctx.fillText('ADS 成長表', 105, 50);
  ctx.font='500 13px sans-serif'; ctx.fillStyle='rgba(255,255,255,.75)';
  var reportLabel = isYearly
    ? (isFans?'粉絲成長':'客人狀態') + ' · ' + year + ' 年度報表'
    : (isFans?'粉絲成長':'客人狀態') + ' · ' + year + ' 年 ' + monthIndex + ' 月報表';
  ctx.fillText(reportLabel.toUpperCase(), 108, 72);

  /* legend */
  var lx = 60, ly = 116;
  ctx.font='500 13px sans-serif';
  categories.forEach(function(name, i){
    ctx.fillStyle = colors[i];
    ctx.fillRect(lx,ly-12,12,12);
    ctx.fillStyle='#ccc'; ctx.fillText(name, lx+18, ly);
    lx += ctx.measureText(name).width + 44;
  });

  /* chart area */
  var chartTop = 140, chartH = H - chartTop - 40;
  var chartCanvas = document.createElement('canvas');
  chartCanvas.width = W - 80; chartCanvas.height = chartH;

  var labels, datasets;
  if (isYearly) {
    labels = MONTHS;
    datasets = categories.map(function(name, ci){
      return {
        label: name,
        data: MONTHS.map(function(_,mi){ return (allData[key(year,mi+1)]||[])[ci]||0; }),
        backgroundColor: colors[ci], stack:'s',
        datalabels:{
          display:function(c){ return c.dataset.data[c.dataIndex]>0; },
          color:'#fff', font:{size:11,weight:'500'}, formatter:fmtNum,
          anchor:'center',align:'center',clamp:true
        }
      };
    });
  } else {
    /* monthly: single grouped bar, one bar per category */
    labels = categories;
    var mk = key(year, monthIndex);
    var row = allData[mk] || categories.map(function(){return 0;});
    datasets = [{
      label: monthIndex+'月',
      data: row,
      backgroundColor: colors,
      datalabels:{
        display:function(c){ return c.dataset.data[c.dataIndex]>0; },
        color:'#fff', font:{size:13,weight:'500'}, formatter:fmtNum,
        anchor:'center',align:'center',clamp:true
      }
    }];
  }

  var tmpChart = new Chart(chartCanvas, {
    type:'bar',
    data:{ labels:labels, datasets:datasets },
    plugins: isYearly ? [makeTotalPlugin()] : [ChartDataLabels],
    options:{
      responsive:false, animation:false,
      layout:{ padding:{top:isYearly?28:20,right:10,bottom:10,left:10} },
      plugins:{
        legend:{display:false}, datalabels:{},
        tooltip:{enabled:false}
      },
      scales:{
        x:{
          stacked: isYearly,
          ticks:{color:'rgba(240,237,232,.6)',font:{size:12}},
          grid:{color:'rgba(255,255,255,.06)'}
        },
        y:{
          stacked: isYearly,
          ticks:{color:'rgba(240,237,232,.6)',font:{size:12},callback:function(v){return v>=1000?(v/1000).toFixed(0)+'K':v;}},
          grid:{color:'rgba(255,255,255,.08)'}
        }
      }
    }
  });

  /* slight delay to let chart render */
  setTimeout(function(){
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();
    roundRect(ctx, 40, chartTop, W-80, chartH, 12);
    ctx.fill();
    ctx.drawImage(chartCanvas, 40, chartTop);
    tmpChart.destroy();
    callback(offCanvas);
  }, 300);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function dlMonthPNG() {
  var tab = modalTab;
  var year = document.getElementById(tab==='fans'?'f-year':'c-year').value;
  var month = tab==='fans'?fMonth:cMonth;
  renderReportCanvas(tab, year, month, false, function(c){
    downloadLink(c.toDataURL('image/png'), 'ADS_'+(tab==='fans'?'粉絲':'客人')+'_'+year+'年'+month+'月報表.png');
  });
}

function dlYearPNG() {
  var tab = modalTab;
  var year = document.getElementById(tab==='fans'?'f-year':'c-year').value;
  renderReportCanvas(tab, year, null, true, function(c){
    downloadLink(c.toDataURL('image/png'), 'ADS_'+(tab==='fans'?'粉絲':'客人')+'_'+year+'年度報表.png');
  });
}

function buildCSV(tab, year, isYearly, month) {
  var isFans = tab === 'fans';
  var categories = isFans ? PLATFORMS : CLIENT_TYPES;
  var allData = isFans ? fansData : clientsData;
  var rows = [];

  if (isYearly) {
    rows.push(['月份'].concat(categories).concat(['總計']));
    MONTHS.forEach(function(m, mi){
      var mk = key(year, mi+1);
      var vals = allData[mk] || categories.map(function(){return 0;});
      var total = vals.reduce(function(a,b){return a+b;},0);
      rows.push([m].concat(vals).concat([total]));
    });
    /* yearly totals row */
    var totals = categories.map(function(_,ci){
      return MONTHS.reduce(function(s,_,mi){ return s+((allData[key(year,mi+1)]||[])[ci]||0); },0);
    });
    rows.push(['全年合計'].concat(totals).concat([totals.reduce(function(a,b){return a+b;},0)]));
  } else {
    var mk = key(year, month);
    var vals = allData[mk] || categories.map(function(){return 0;});
    rows.push(['類別','數量']);
    categories.forEach(function(c,i){ rows.push([c, vals[i]]); });
    rows.push(['總計', vals.reduce(function(a,b){return a+b;},0)]);
  }

  return '\uFEFF' + rows.map(function(r){ return r.join(','); }).join('\r\n');
}

function dlMonthCSV() {
  var tab = modalTab;
  var year = document.getElementById(tab==='fans'?'f-year':'c-year').value;
  var month = tab==='fans'?fMonth:cMonth;
  var csv = buildCSV(tab, year, false, month);
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  downloadLink(URL.createObjectURL(blob), 'ADS_'+(tab==='fans'?'粉絲':'客人')+'_'+year+'年'+month+'月報表.csv');
}

function dlYearCSV() {
  var tab = modalTab;
  var year = document.getElementById(tab==='fans'?'f-year':'c-year').value;
  var csv = buildCSV(tab, year, true, null);
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  downloadLink(URL.createObjectURL(blob), 'ADS_'+(tab==='fans'?'粉絲':'客人')+'_'+year+'年度報表.csv');
}
